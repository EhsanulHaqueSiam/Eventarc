# docker-compose.umami.yml
# Self-hosted Umami analytics — mirrors the upstream compose file at
# https://github.com/umami-software/umami/blob/master/docker-compose.yml
# with the two minimum adjustments needed for Dokploy:
#   1. `expose:` instead of `ports:` so Traefik is the only ingress.
#   2. External `dokploy-network` so Traefik can reach the umami service.
#
# Dokploy usage:
#   1. Create a "Docker Compose" application (not "Application").
#   2. Point it at this repo, compose file: docker-compose.umami.yml
#   3. Add env vars from .env.umami.example in the Dokploy UI.
#   4. In the Domains tab, add:
#        Host:            analytics.altoras.com
#        Service Name:    umami
#        Container Port:  3000
#        HTTPS:           on
#        Certificate:     Let's Encrypt
#   5. Deploy. First login: admin / umami (change it immediately).
#
# After deploy — add websites to track:
#   Umami admin → Settings → Websites → + Add Website.
#   Copy the Website ID and the /script.js URL.
#   Set VITE_UMAMI_WEBSITE_ID + VITE_UMAMI_SCRIPT_URL in each tracked app.

services:
  umami:
    image: ghcr.io/umami-software/umami:latest
    init: true
    restart: always
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
    networks:
      - dokploy-network
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:3000/api/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  umami-db-data:

networks:
  dokploy-network:
    external: true
  internal:
    driver: bridge
