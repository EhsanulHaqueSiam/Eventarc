services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: eventarc
      POSTGRES_USER: eventarc
      POSTGRES_PASSWORD: ${PG_PASSWORD:-dev_password}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventarc"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgbouncer:
    image: bitnami/pgbouncer:latest
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_DATABASE: eventarc
      POSTGRESQL_USERNAME: eventarc
      POSTGRESQL_PASSWORD: ${PG_PASSWORD:-dev_password}
      PGBOUNCER_DATABASE: eventarc
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_DEFAULT_POOL_SIZE: "150"
      PGBOUNCER_MAX_CLIENT_CONN: "10000"
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: ./backend
      target: worker
    environment:
      - ENV=${ENV:-development}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://eventarc:${PG_PASSWORD:-dev_password}@pgbouncer:6432/eventarc?sslmode=disable
      - HMAC_SECRET=${HMAC_SECRET:-dev-hmac-secret-change-in-production}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-eventarc-qr}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
