services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: eventarc
      POSTGRES_USER: eventarc
      POSTGRES_PASSWORD: ${PG_PASSWORD:-dev_password}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventarc"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:1.25.1
    environment:
      DATABASE_URL: postgres://eventarc:${PG_PASSWORD:-dev_password}@postgres:5432/eventarc
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "150"
      MAX_CLIENT_CONN: "10000"
      AUTH_TYPE: scram-sha-256
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: ./backend
      target: worker
    environment:
      - ENV=${ENV:-development}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://eventarc:${PG_PASSWORD:-dev_password}@pgbouncer:5432/eventarc?sslmode=disable
      - HMAC_SECRET=${HMAC_SECRET:-dev-hmac-secret-change-in-production}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-eventarc-qr}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
