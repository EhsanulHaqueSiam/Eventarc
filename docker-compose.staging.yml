# docker-compose.staging.yml
# Production-scale staging environment for Phase 10 load testing.
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# Overrides base docker-compose.yml with:
# - Production-tuned PostgreSQL settings (shared_buffers, work_mem, max_connections)
# - PgBouncer transaction pooling with 150 pool size
# - Redis 8 with maxmemory and noeviction policy
# - Server with GOMAXPROCS=4
# - Worker with 512MB memory limit and GOMEMLIMIT

services:
  postgres:
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=4MB
      -c max_connections=200
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=16MB
      -c max_wal_size=1GB
      -c checkpoint_completion_target=0.9
      -c log_min_duration_statement=200
    deploy:
      resources:
        limits:
          memory: 1G

  pgbouncer:
    environment:
      DEFAULT_POOL_SIZE: "150"
      MAX_CLIENT_CONN: "10000"
      POOL_MODE: transaction
      MIN_POOL_SIZE: "25"
      RESERVE_POOL_SIZE: "10"
      RESERVE_POOL_TIMEOUT: "3"
      SERVER_LIFETIME: "3600"
      SERVER_IDLE_TIMEOUT: "600"
      LOG_CONNECTIONS: "0"
      LOG_DISCONNECTIONS: "0"

  redis:
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --save ""
      --appendonly no
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    environment:
      - GOMAXPROCS=2
      - GOMEMLIMIT=450MiB
      - HMAC_SECRET=${HMAC_SECRET:-staging_hmac_secret_not_for_production}
      - LOG_LEVEL=warn
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2"
